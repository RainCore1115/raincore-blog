name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request_target:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '22.11.0'

      - name: Inject last update time and version
        run: |
          LAST_UPDATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d')
          echo "Last update: $LAST_UPDATE"
          find . -name "*.html" -not -path "./.git/*" | while read f; do
            sed -i "s/__LAST_UPDATE__/$LAST_UPDATE/g" "$f"
            sed -i "s/__APP_VERSION__/$LAST_UPDATE/g" "$f"
          done
